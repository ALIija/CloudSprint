# Celery Configuration for Landing Page CMS
broker_url = 'memory://'
result_backend = 'rpc://'

task_serializer = 'json'
result_serializer = 'json'
accept_content = ['json']
timezone = 'UTC'
enable_utc = True

# Task routing
task_routes = {
    'landing_page_cms.tasks.export_content': {'queue': 'export'},
    'landing_page_cms.tasks.optimize_images': {'queue': 'media'},
    'landing_page_cms.tasks.invalidate_cache': {'queue': 'cache'},
}

# Worker settings
worker_prefetch_multiplier = 1
worker_max_tasks_per_child = 1000
worker_disable_rate_limits = False

# Task settings
task_always_eager = False
task_eager_propagates = True
task_ignore_result = False

# Beat schedule
beat_schedule = {
    'export-content-every-hour': {
        'task': 'landing_page_cms.tasks.scheduled_export',
        'schedule': 3600.0,  # Every hour
    },
    'cleanup-old-exports': {
        'task': 'landing_page_cms.tasks.cleanup_exports',
        'schedule': 86400.0,  # Daily
    },
}
