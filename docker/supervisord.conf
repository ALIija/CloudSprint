[supervisord]
nodaemon=true
user=appuser
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
stderr_logfile=/var/log/nginx/error.log
stdout_logfile=/var/log/nginx/access.log
user=root

[program:wagtail]
command=gunicorn landing_page_cms.wsgi:application --bind 127.0.0.1:8000 --workers 2 --timeout 120
directory=/app
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/wagtail.err.log
stdout_logfile=/var/log/supervisor/wagtail.out.log
user=appuser
environment=DJANGO_SETTINGS_MODULE="landing_page_cms.settings.production"

[program:fastapi]
command=uvicorn landing_page_cms.api:app --host 127.0.0.1 --port 8001 --workers 1
directory=/app
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/fastapi.err.log
stdout_logfile=/var/log/supervisor/fastapi.out.log
user=appuser

[program:celery]
command=celery -A landing_page_cms worker --loglevel=info --concurrency=2
directory=/app
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/celery.err.log
stdout_logfile=/var/log/supervisor/celery.out.log
user=appuser
environment=DJANGO_SETTINGS_MODULE="landing_page_cms.settings.production"

[program:celery-beat]
command=celery -A landing_page_cms beat --loglevel=info
directory=/app
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/celery-beat.err.log
stdout_logfile=/var/log/supervisor/celery-beat.out.log
user=appuser
environment=DJANGO_SETTINGS_MODULE="landing_page_cms.settings.production"
